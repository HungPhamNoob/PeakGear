<div class="payment-method payment-method--zalopay" data-bind="css: {'_active': (getCode() == isChecked())}, click: selectPaymentMethod">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>
        <label class="label" data-bind="attr: {'for': getCode()}">
            <span>ZaloPay</span>
        </label>
    </div>

    <div class="pg-wallet-action" data-bind="visible: (getCode() == isChecked())">
        <button type="button"
                class="action primary checkout pg-wallet-action__btn"
                data-bind="click: startGatewayPayment, enable: canStartGatewayPayment, css: {'disabled': !canStartGatewayPayment()}">
            <span data-bind="i18n: 'Thanh toán với ZaloPay'"></span>
        </button>

        <div class="pg-wallet-action__note" data-bind="visible: !isGatewayConfigured()">
            <span data-bind="i18n: 'ZaloPay chưa được cấu hình. Vui lòng cập nhật biến môi trường trước khi thanh toán.'"></span>
        </div>
    </div>
</div>
