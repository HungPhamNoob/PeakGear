<div class="opc-block-summary" data-bind="blockLoader: isLoading">
    <span data-bind="i18n: 'Tổng quan đơn hàng'" class="title"></span>
    <!-- ko foreach: elems() -->
        <!-- ko template: getTemplate() --><!-- /ko -->
    <!-- /ko -->

    <div class="opc-block-summary-footer" data-bind="visible: isPlaceOrderFooterVisible()">
        <button type="button"
            class="action primary pg-place-order-footer"
            data-bind="click: placeOrderFromSummary, enable: isGenericPlaceOrderAllowed(), css: {'disabled': !isGenericPlaceOrderAllowed()}">
            <span data-bind="i18n: 'Đặt hàng'"></span>
        </button>
        <div class="wallet-payment-message" data-bind="visible: !isGenericPlaceOrderAllowed()" style="margin-top: 10px; color: #e02b27; font-size: 1rem; text-align: center;">
            <span data-bind="i18n: 'Vui lòng chọn thanh toán bằng ví điện tử'"></span>
        </div>
    </div>
</div>
