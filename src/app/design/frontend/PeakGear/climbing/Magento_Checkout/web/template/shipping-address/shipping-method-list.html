<div class="pg-checkout__delivery-mode">
    <p class="pg-checkout__delivery-mode-title" translate="'Phương thức giao hàng'"></p>
    <div class="field choice pg-checkout__delivery-mode-option">
        <input type="radio"
               id="pg-delivery-home"
               name="pg-delivery-mode"
               value="home"
               data-bind="checked: deliveryMode" />
        <label for="pg-delivery-home" translate="'Giao hàng tận nơi'"></label>
    </div>
    <div class="field choice pg-checkout__delivery-mode-option">
        <input type="radio"
               id="pg-delivery-store"
               name="pg-delivery-mode"
               value="store"
               data-bind="checked: deliveryMode" />
        <label for="pg-delivery-store" translate="'Nhận tại cửa hàng'"></label>
    </div>
</div>

<div id="checkout-shipping-method-load"
     class="pg-checkout__shipping-method-list"
     data-bind="visible: showShippingMethodList">
    <table class="table-checkout-shipping-method">
        <thead>
        <tr class="row">
            <th class="col col-method" translate="'Chọn hình thức'"></th>
            <th class="col col-price" translate="'Giá'"></th>
            <th class="col col-method" translate="'Hình thức giao hàng'"></th>
            <th class="col col-carrier" translate="'Đơn vị vận chuyển'"></th>
        </tr>
        </thead>
        <tbody>
            <!-- ko foreach: { data: rates(), as: 'method'} -->
                <!-- ko template: { name: element.shippingMethodItemTemplate } --><!-- /ko -->
            <!-- /ko -->
        </tbody>
    </table>
</div>
