<div if="isPaymentMethodsAvailable()"
     class="items payment-methods">
    <div repeat="foreach: paymentGroupsList, item: '$group'"
         class="payment-group">
        <!-- ko foreach: getRegion($group().displayArea) -->
        <div class="payment-method-slot" data-bind="template: getTemplate()"></div>
        <!-- /ko -->
    </div>
</div>
<div ifnot="isPaymentMethodsAvailable()"
     class="no-payments-block"
     translate="'Không có phương thức thanh toán khả dụng'">
</div>
