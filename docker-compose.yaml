services:
  mysql:
    image: mysql:8.0
    container_name: peakgear_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: >
      --innodb-buffer-pool-size=256M
      --max-connections=50
      --innodb-log-file-size=64M
      --innodb-flush-log-at-trx-commit=2
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - magento_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: peakgear_opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=P@ssw0rd!2024Secure
      - OPENSEARCH_NODE_MEMORY=256m
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    networks:
      - magento_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || wget --spider -q http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: peakgear_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - magento_network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: peakgear_php
    user: "33:33"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PHP_DISPLAY_ERRORS=On
      - MAGENTO_MODE=developer
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
      opensearch:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - magento_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.24-alpine
    container_name: peakgear_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - magento_network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: peakgear_phpmyadmin
    restart: unless-stopped
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      - mysql
    ports:
      - "8080:80"
    networks:
      - magento_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

volumes:
  mysql_data:
    driver: local
  opensearch_data:
    driver: local
  redis_data:
    driver: local

networks:
  magento_network:
    driver: bridge
